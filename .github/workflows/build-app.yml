# Build the BonitoAgentsApp desktop bundles (ElectronCall + local server +
# worker) with AppBundler on every push to main and every v* tag.
#
# - main pushes / manual runs: bundles end up as workflow artifacts.
# - tag pushes: a GitHub release is created for the tag (if it doesn't exist
#   yet) and the bundles are attached to it.
#
# Adapted from AppBundler's recipes/workflows/GitHub.yml.
name: Build app bundles

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      upload_tag:
        description: 'Optional: existing release tag to upload the bundles to'
        required: false
        default: ''
        type: string

concurrency:
  group: build-app-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

# Don't eagerly auto-precompile on instantiate. The meta env would otherwise
# precompile Conda/PyCall BEFORE Pkg.build() sets up the conda env (that pass
# fails and is thrown away), and the app stack would be compiled into ~/.julia
# only for AppBundler to recompile it into the bundle's own depot. With this off,
# AppBundler compiles lazily on load and the app compiles once, in the bundle.
# (Explicit precompile / load-time precompile still happen — this only suppresses
# the post-instantiate auto pass.)
env:
  JULIA_PKG_PRECOMPILE_AUTO: '0'

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # Every platform ships the SAME format: a relocatable, UNSIGNED .tar.gz
        # (no macOS notarization / Windows MSIX signing). The bundle carries the
        # right launcher per OS (.sh on unix, .bat on Windows) + an install
        # script; users extract and run.
        include:
          - runner: macos-latest
            os: macos
            arch: aarch64
            bundle: tarball
          - runner: macos-15-intel
            os: macos
            # `x86_64`, NOT `x64`: `--target-arch` is passed straight to Julia's
            # BinaryPlatforms.MacOS(arch), which only accepts `x86_64`/`aarch64`
            # ("x64" is Julia's *download* label, not a platform arch).
            arch: x86_64
            bundle: tarball
          - runner: ubuntu-latest
            os: linux
            arch: x86_64
            bundle: tarball
            xvfb: true
          - runner: ubuntu-24.04-arm
            os: linux
            arch: aarch64
            bundle: tarball
            xvfb: true
          - runner: windows-latest
            os: windows
            arch: x86_64
            bundle: tarball

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'

      - uses: julia-actions/cache@v2

      - name: Instantiate AppBundler (meta env)
        run: julia --project=BonitoAgentsApp/meta -e 'using Pkg; Pkg.instantiate(); Pkg.build()'

      - name: Instantiate app project
        run: julia --project=BonitoAgentsApp -e 'using Pkg; Pkg.instantiate()'

      - name: Build bundle
        run: >
          ${{ matrix.xvfb && 'xvfb-run -s ''-screen 0 1024x768x24''' || '' }}
          julia --project=BonitoAgentsApp/meta -m AppBundler build BonitoAgentsApp
          --build-dir=build --target-arch=${{ matrix.arch }}
          --target-os=${{ matrix.os }}
          --target-bundle=${{ matrix.bundle }}

      - uses: actions/upload-artifact@v4
        with:
          name: bonitoagents-${{ matrix.os }}-${{ matrix.arch }}
          path: build/*
          retention-days: 14

  upload:
    name: Upload to release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.upload_tag != ''
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create release (tag pushes) and upload bundles
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG_NAME="${{ github.event.inputs.upload_tag || github.ref_name }}"
          echo "Uploading to release: $TAG_NAME"

          if ! gh release view "$TAG_NAME" > /dev/null 2>&1; then
            gh release create "$TAG_NAME" --verify-tag --generate-notes \
              --title "$TAG_NAME"
          fi

          find artifacts/ -type f | while read -r file; do
            # Stable, version-free asset names: bonitoagents-<os>-<arch>.<ext>
            # (the artifact dir is already `bonitoagents-<os>-<arch>`). This keeps
            # `/releases/latest/download/<asset>` URLs permanent, so install.sh
            # never has to know the version.
            platform="$(basename "$(dirname "$file")")"   # bonitoagents-<os>-<arch>
            case "$file" in
              *.tar.gz) ext=".tar.gz" ;;
              *)        ext=".${file##*.}" ;;
            esac
            name="${platform}${ext}"
            echo "Uploading: $file as $name"
            cp "$file" "/tmp/$name"
            gh release upload "$TAG_NAME" "/tmp/$name" --clobber
          done

          echo "All bundles uploaded."
