# Build (and, on main, deploy) the BonitoAgents documentation — the
# DocumenterBonito site under docs/. The docs env (docs/Project.toml) already
# pins every unregistered package: the monorepo subpackages by relative path
# and the forks (Bonito/BonitoBook/BonitoWidgets/MsgPack) by git url+rev, so a
# plain `instantiate` resolves the whole tree — no `Pkg.develop` needed.
name: Documentation

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # push the built site to gh-pages
      pull-requests: write    # push_preview comments on PRs
      statuses: write
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
      - name: Instantiate docs env
        run: julia --project=docs -e 'using Pkg; Pkg.instantiate()'
      - name: Build and deploy
        run: julia --project=docs docs/make.jl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}

      # Serve the installers from the site root so
      # `curl -fsSL https://agents.bonito.sh/install.sh | sh` works. Documenter
      # owns the versioned subdirs + the root redirect/CNAME; install.sh and
      # install.ps1 are extra root files it leaves untouched, and this step
      # re-publishes them after every deploy (self-healing if ever dropped).
      # Real deploys only — never PR previews.
      - name: Check out gh-pages
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-site

      - name: Publish install scripts to the site root
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        run: |
          cp install.sh install.ps1 gh-pages-site/
          cd gh-pages-site
          if [ -n "$(git status --porcelain install.sh install.ps1)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add install.sh install.ps1
            git commit -m "Publish install scripts to site root"
            git push origin gh-pages
          else
            echo "install scripts unchanged — nothing to publish"
          fi
