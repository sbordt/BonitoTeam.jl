# Dedicated test environment. `Pkg.test` / `ReTestItems.runtests` activate THIS
# project, so its `[sources]` decide where deps resolve from. The packages UNDER
# TEST (BonitoAgents + its sibling sub-packages) resolve from the local dev
# checkouts so tests run against the source we're editing; everything else
# (Bonito/BonitoBook/BonitoWidgets/ElectronCall) pins to the SAME git url+rev CI
# uses, NOT a local folder — the local layout isn't reproducible on CI. Keep
# these revs in sync with BonitoAgents's own `[sources]`. Scoped to BonitoAgents's
# real deps + the test tools, so it never drags in the umbrella's Makie/Sunny stack.
[deps]
BonitoAgents = "f4e5b6c7-8901-4a2b-9c3d-4e5f6a7b8c9d"
AgentClientProtocol = "a1b2c3d4-1234-5678-abcd-a1b2c3d4e5f6"
AgentProviders = "c3d4e5f6-7a8b-49c0-b1d2-e3f4a5b6c7d8"
BonitoMCP = "4a1c91af-1c90-46a4-8594-a3846516869d"
BonitoWorker = "98909ed9-6989-4829-81af-73688ee23085"
RemoteSync = "8d4f0e91-3a2b-4d6c-9e8f-1a2b3c4d5e6f"
Bonito = "824d6782-a2ef-11e9-3a09-e5662e0c26f8"
ElectronCall = "8ddd578f-0c94-4c64-8c65-f083f291b266"
BonitoBook = "b416d416-7a6e-4336-8c1a-1f8a8cd59518"
BonitoWidgets = "62a4b9e4-7ee6-4bfa-b661-80bcb0a47665"
ReTestItems = "817f1d60-ba6b-4fd5-9520-3cf149f6a823"
MockACP = "d4e5f6a7-8b9c-40d1-a2e3-f4a5b6c7d8e9"
Pkg = "44cfe95a-1eb2-52ea-b672-e2afdf69b78f"
