name = "BonitoAgentsApp"
uuid = "ada3638d-cc8c-48ff-af65-d13385ab7a5c"
version = "0.1.0"
authors = ["Simon Danisch <sdanisch@gmail.com>"]

[deps]
Bonito = "824d6782-a2ef-11e9-3a09-e5662e0c26f8"
BonitoAgents = "f4e5b6c7-8901-4a2b-9c3d-4e5f6a7b8c9d"
BonitoBook = "b416d416-7a6e-4336-8c1a-1f8a8cd59518"
BonitoMCP = "4a1c91af-1c90-46a4-8594-a3846516869d"
BonitoWorker = "98909ed9-6989-4829-81af-73688ee23085"
Downloads = "f43a241f-c20a-4ad4-852c-f6b1247861c6"
HTTP = "cd3eb016-35fb-5094-929b-558a96fad6f3"
PrecompileTools = "aea7be01-6a6a-4083-8856-8a6e6704d82a"
Random = "9a3f8284-a2c9-5f02-9a11-845980a1fd5c"

# NOTE: WGLMakie/Makie/ComputePipeline were deps ONLY to bake a precompiled
# WGLMakie into the bundle so the eval worker inherited it (fast first plot).
# That coupled the worker to the bundle's Makie/Bonito instead of the chat
# project's. The eval worker now runs with a clean env (see BonitoMCP `start!`),
# so it uses the PROJECT's Bonito/WGLMakie; nothing here needs the Makie stack.
# ElectronCall was likewise dropped: the desktop role opens the dashboard in the
# user's default browser (see `open_browser`), so no Electron is bundled.

[sources]
Bonito = {rev = "master", url = "https://github.com/SimonDanisch/Bonito.jl.git"}
BonitoAgents = {path = "../BonitoAgents"}
# BonitoBook is a transitive dep (via BonitoAgents); pin its branch at the root
# too so resolution always honors the sd/llm-improvements tip (which allows
# Bonito 5) rather than a stale cached tree.
BonitoBook = {rev = "sd/llm-improvements", url = "https://github.com/SimonDanisch/BonitoBook.jl.git"}
BonitoMCP = {path = "../BonitoMCP"}
BonitoWorker = {path = "../BonitoWorker"}

[compat]
HTTP = "1, 2"
PrecompileTools = "1"
julia = "1.12"
