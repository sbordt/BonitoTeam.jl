[deps]
Bonito = "824d6782-a2ef-11e9-3a09-e5662e0c26f8"
BonitoAgents = "f4e5b6c7-8901-4a2b-9c3d-4e5f6a7b8c9d"
BonitoMCP = "4a1c91af-1c90-46a4-8594-a3846516869d"
BonitoWorker = "98909ed9-6989-4829-81af-73688ee23085"
ComputePipeline = "95dc2771-c249-4cd0-9c9f-1f3b4330693c"
ElectronCall = "8ddd578f-0c94-4c64-8c65-f083f291b266"
HTTP = "cd3eb016-35fb-5094-929b-558a96fad6f3"
Makie = "ee78f7c6-11fb-53f2-987a-cfe4a2b5a57a"
PrecompileTools = "aea7be01-6a6a-4083-8856-8a6e6704d82a"
Random = "9a3f8284-a2c9-5f02-9a11-845980a1fd5c"
URIs = "5c2747f8-b7ea-4ff2-ba2e-563bfd36b1d4"
WGLMakie = "276b4fcb-3e11-5398-bf8b-a0c2d153d008"

[sources]
Bonito = {rev = "sd/v5", url = "https://github.com/SimonDanisch/Bonito.jl.git"}
BonitoAgents = {path = "../BonitoAgents"}
BonitoMCP = {path = "../BonitoMCP"}
BonitoWorker = {path = "../BonitoWorker"}
ElectronCall = {url = "https://github.com/IanButterworth/ElectronCall.jl.git", rev = "sd/testsuite"}
# Makie stack pinned TOGETHER on the ElectronCall-integration branch (monorepo
# subdirs). All three must move as a unit: WGLMakie@sd/electroncall calls
# Makie internals (e.g. `shared_precompile_paths`) that the registry Makie
# doesn't have, so leaving Makie/ComputePipeline on the registry breaks the
# bundle's WGLMakie precompile. git-url (not path) so CI, which clones only the
# BonitoAgents repo, can fetch them too.
ComputePipeline = {url = "https://github.com/MakieOrg/Makie.jl.git", rev = "sd/electroncall", subdir = "ComputePipeline"}
Makie = {url = "https://github.com/MakieOrg/Makie.jl.git", rev = "sd/electroncall", subdir = "Makie"}
WGLMakie = {url = "https://github.com/MakieOrg/Makie.jl.git", rev = "sd/electroncall", subdir = "WGLMakie"}

[compat]
ElectronCall = "1"
HTTP = "1, 2"
PrecompileTools = "1"
URIs = "1.3"
julia = "1.12"
