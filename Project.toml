# Top-level monorepo env. `julia --project=.` from this directory pulls in
# every sibling package (BonitoTeam, BonitoMCP, BonitoWorker, AgentClientProtocol)
# via [sources]. Use this on the SERVER. Workers use the leaner
# BonitoWorker/ env directly.

[deps]
BonitoTeam = "f4e5b6c7-8901-4a2b-9c3d-4e5f6a7b8c9d"

# Only direct deps may appear in [sources]. The transitive paths
# (BonitoMCP, BonitoWorker, AgentClientProtocol) are declared inside
# BonitoTeam/Project.toml and resolved from there.
[sources]
BonitoTeam = {path = "BonitoTeam"}

[compat]
julia = "1.11"
