# The unregistered tree rides in `[deps]` (not `[extras]`): Pkg requires every
# `[sources]` entry to be listed, does NOT consult a dependency's own
# `[sources]`, and only runs the git-repo update pass for DIRECT deps — an
# extras-only entry resolves against a stale cached clone.
[deps]
AgentClientProtocol = "a1b2c3d4-1234-5678-abcd-a1b2c3d4e5f6"
AgentProviders = "c3d4e5f6-7a8b-49c0-b1d2-e3f4a5b6c7d8"
Bonito = "824d6782-a2ef-11e9-3a09-e5662e0c26f8"
BonitoAgents = "f4e5b6c7-8901-4a2b-9c3d-4e5f6a7b8c9d"
BonitoBook = "b416d416-7a6e-4336-8c1a-1f8a8cd59518"
BonitoMCP = "4a1c91af-1c90-46a4-8594-a3846516869d"
BonitoWidgets = "62a4b9e4-7ee6-4bfa-b661-80bcb0a47665"
BonitoWorker = "98909ed9-6989-4829-81af-73688ee23085"
# DocumenterBonito bundles the site's JS with Deno. It comes transitively via
# Bonito, but list it explicitly (as Bonito's own docs do) so a future Bonito
# that drops the transitive dep can't silently break the doc build.
Deno_jll = "04572ae6-984a-583e-9378-9577a1c2574d"
Documenter = "e30172f5-a6a5-5a46-863b-614d45cd2de4"
MsgPack = "99f44e22-a591-53d1-9472-aa23ef4bd671"
RemoteSync = "8d4f0e91-3a2b-4d6c-9e8f-1a2b3c4d5e6f"
[sources]
BonitoAgents = {path = "../BonitoAgents"}
AgentClientProtocol = {path = "../AgentClientProtocol"}
AgentProviders = {path = "../AgentProviders"}
BonitoMCP = {path = "../BonitoMCP"}
BonitoWorker = {path = "../BonitoWorker"}
RemoteSync = {path = "../RemoteSync"}
Bonito = {rev = "master", url = "https://github.com/SimonDanisch/Bonito.jl.git"}
BonitoBook = {rev = "sd/llm-improvements", url = "https://github.com/SimonDanisch/BonitoBook.jl.git"}
BonitoWidgets = {url = "https://github.com/SimonDanisch/BonitoWidgets.jl.git", rev = "main"}
MsgPack = {url = "https://github.com/JuliaIO/MsgPack.jl", rev = "master"}
